<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ФотоСинтез</title>

<link rel="icon" href="frontend/images/favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; }

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#eef5f1,#f8fbf9);
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    height:80px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header-img{ height:50px; }

.main{ flex:1; display:flex; overflow:hidden; }

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#1F6F54,#15523F);
    padding:25px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    color:white;
}

.sidebar button{
    border:none;
    padding:12px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:12px;
    background:white;
    color:#1F6F54;
    transition:0.2s;
}

.sidebar button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.content{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:40px;
}

.message{
    max-width:60%;
    padding:18px;
    margin:18px 0;
    border-radius:20px;
    animation:fade 0.3s ease forwards;
}

.user{
    background:#DFF3E7;
    margin-left:auto;
}

.bot{
    background:white;
    box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

#drop-area{
    height:130px;
    border:2px dashed #1F6F54;
    border-radius:20px;
    margin:20px 40px 30px 40px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}

#drop-area:hover{
    background:#f3faf6;
    transform:scale(1.01);
}

#fileInput{display:none;}
img.preview,img.result{max-width:100%; border-radius:12px;}
</style>
</head>
<body>

<div class="header">
    <img src="frontend/images/logo2.png" class="header-img">
    <img src="frontend/images/name.png" class="header-img">
    <img src="frontend/images/user.png" class="header-img">
</div>

<div class="main">
    <div class="sidebar">
        <div>
            <button>Новый чат</button>
        </div>
        <div>
            <div style="margin-bottom:15px;">Имя пользователя</div>
            <button style="background:#C8F2D9;">Оформить подписку</button>
        </div>
    </div>

    <div class="content">
        <div class="chat-container"></div>
        <div id="drop-area">
            Перетащите изображение сюда или нажмите для выбора
            <input type="file" id="fileInput" multiple>
        </div>
    </div>
</div>

<script>

const API_URL = "https://noddingly-endocarpoid-juan.ngrok-free.dev";
const chat = document.getElementById("chat");
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const newChatBtn = document.getElementById("newChat");

let chatHistory = JSON.parse(localStorage.getItem("chatHistory")) || [];

function scrollToBottom() {
    chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
}

async function loadImageNgrok(url){

    const response = await fetch(url,{
        headers:{
            "ngrok-skip-browser-warning":"true"
        }
    });

    if(!response.ok){
        throw new Error("Image load failed");
    }

    const blob = await response.blob();
    return URL.createObjectURL(blob);
}


function loadChatHistory() {

    chatHistory.forEach(async msg => {

        const div = document.createElement("div");
        div.className = "message " + msg.type;

        if(msg.type === "user") {

            const img = document.createElement("img");
            img.className = "preview";
            img.src = msg.imgData;
            div.appendChild(img);

        } else if(msg.type === "bot") {

            if(msg.imgUrl){

                const img = document.createElement("img");
                img.className = "result";

                try{
                    img.src = await loadImageNgrok(msg.imgUrl);
                }catch(e){
                    console.error(e);
                }

                div.appendChild(img);

                const downloadIcon = document.createElement("img");

                downloadIcon.className = "download-icon";
                downloadIcon.src = "frontend/images/download-icon.png";
                downloadIcon.onclick = async () => {

                    try{

                        const res = await fetch(msg.imgUrl,{
                            headers:{
                                "ngrok-skip-browser-warning":"true"
                            }
                        });

                        const blob = await res.blob();
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = "result.png";
                        a.click();
                        URL.revokeObjectURL(a.href);

                    }catch(err){
                        console.error(err);
                    }
                };

                div.appendChild(downloadIcon);
            }

            if(msg.metricsText){

                const p = document.createElement("p");
                p.innerText = msg.metricsText;
                div.appendChild(p);
            }
        }

        chat.appendChild(div);

    });

    scrollToBottom();
}



function addUserMessage(file) {

    const imgUser = document.createElement("img");

    imgUser.className = "preview";

    imgUser.src = URL.createObjectURL(file);

    const div = document.createElement("div");

    div.className = "message user";

    div.appendChild(imgUser);

    chat.appendChild(div);

    scrollToBottom();

    const reader = new FileReader();

    reader.onload = function(e) {

        chatHistory.push({

            type: "user",

            imgData: e.target.result

        });

        localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

    };

    reader.readAsDataURL(file);
}



async function addBotMessage(imgUrl, metricsText){

    const div = document.createElement("div");

    div.className = "message bot";

    if(imgUrl){

        const img = document.createElement("img");

        img.className = "result";

        img.src = imgUrl;

        div.appendChild(img);

        const downloadIcon = document.createElement("img");

        downloadIcon.className = "download-icon";

        downloadIcon.src = "frontend/images/download-icon.png";

        downloadIcon.onclick = async () => {

            try{

                const res = await fetch(imgUrl,{
                    headers:{
                        "ngrok-skip-browser-warning":"true"
                    }
                });

                const blob = await res.blob();

                const a = document.createElement('a');

                a.href = URL.createObjectURL(blob);

                a.download = "result.png";

                a.click();

                URL.revokeObjectURL(a.href);

            }catch(err){
                console.error(err);
            }
        };

        div.appendChild(downloadIcon);
    }

    if(metricsText){

        const p = document.createElement("p");

        p.innerText = metricsText;

        div.appendChild(p);
    }

    chat.appendChild(div);

    scrollToBottom();

    chatHistory.push({

        type:"bot",

        imgUrl,

        metricsText

    });

    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));
}



newChatBtn.addEventListener("click", ()=>{

    chat.innerHTML = "";

    chatHistory = [];

    localStorage.removeItem("chatHistory");
});



async function handleFiles(files){

    if(!files || files.length === 0) return;

    const formData = new FormData();

    for(const file of files){
        addUserMessage(file);
        formData.append("images", file);
    }

    addBotMessage("", "Анализируем изображения...");

    try{

        const response = await fetch(API_URL + "/analyze", {
            method:"POST",
            headers:{
                "ngrok-skip-browser-warning":"true"
            },
            body: formData
        });

        const data = await response.json();

        if(!data.results){
            addBotMessage("", "Ошибка обработки.");
            return;
        }

        for(const result of data.results){

            const metrics = result.metrics;

            const metricsText = `Результаты анализа:

Корень:
Длина: ${metrics.root_length_cm} см
Площадь: ${metrics.root_area_cm2} см²

Стебель:
Длина: ${metrics.stem_length_cm} см
Площадь: ${metrics.stem_area_cm2} см²

Листья:
Площадь: ${metrics.leaf_area_cm2} см²`;

            addBotMessage(result.image_url, metricsText);
        }

    }catch(err){
        addBotMessage("", "Ошибка при анализе изображений.");
        console.error(err);
    }
}


fileInput.onchange = ()=> handleFiles(fileInput.files);


dropArea.addEventListener("click", ()=> fileInput.click());

dropArea.addEventListener("dragover", (e)=>{

    e.preventDefault();

    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", ()=> dropArea.classList.remove("dragover"));

dropArea.addEventListener("drop", (e)=>{

    e.preventDefault();

    dropArea.classList.remove("dragover");

    if(e.dataTransfer.files.length)
        handleFiles(e.dataTransfer.files);
});


window.addEventListener("load", loadChatHistory);

</script>

</body>
</html>
