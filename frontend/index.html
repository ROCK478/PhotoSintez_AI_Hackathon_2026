<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ФотоСинтез</title>

<link rel="icon" href="images/favicon-32x32.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body { margin:0; font-family:'Inter', sans-serif; background:linear-gradient(135deg,#eef5f1,#f8fbf9); display:flex; flex-direction:column; height:100vh; }

/* HEADER */
.header { height:80px; background:rgba(255,255,255,0.7); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:space-between; padding:0 30px; position:relative; box-shadow:0 4px 20px rgba(0,0,0,0.05); }
.header-img.left { height:50px; object-fit:contain; }
.header-img.center { height:50px; position:absolute; left:50%; transform:translateX(-50%); filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
.header-img.right { height:45px; object-fit:contain; }

/* LAYOUT */
.main { flex:1; display:flex; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:260px; background:linear-gradient(180deg,#1F6F54,#15523F); display:flex; flex-direction:column; justify-content:flex-start;; padding:25px; color:white; box-shadow:4px 0 20px rgba(0,0,0,0.05); }
.sidebar-top { display:flex; flex-direction:column; }
.sidebar-middle { display:flex; flex:1; flex-direction:column; }
.sidebar-bottom { display:flex; flex-direction:column; width:100%;}
.sidebar button { background:white; color:#1F6F54; border:none; padding:12px; border-radius:12px; font-weight:600; cursor:pointer; margin-bottom:12px; transition:0.2s ease; }
.sidebar button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.15); }
.sidebar-middle{
overflow-y:auto;
max-height:70vh;
}


/* CONTENT */
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-container { flex:1; overflow-y:auto; padding:40px; }

/* MESSAGES */
.message { max-width:60%; padding:18px; margin:18px 0; border-radius:20px; position:relative; opacity:0; transform:translateY(10px); animation:fadeIn 0.3s ease forwards; }
@keyframes fadeIn { to { opacity:1; transform:translateY(0); } }
.user { background:#DFF3E7; margin-left:auto; }
.bot { background:white; box-shadow:0 8px 24px rgba(0,0,0,0.06); }

/* IMAGES */
img.preview { max-width:200px; border-radius:12px; }
.bot img.result { display:block; max-width:100%; border-radius:12px; margin-bottom:10px; transition:0.2s; }
.bot img.result:hover { transform:scale(1.03); }
.bot img.download-icon { width:24px; height:24px; position:absolute; bottom:10px; right:10px; cursor:pointer; opacity:0.7; transition:0.2s; }
.bot img.download-icon:hover { opacity:1; transform:scale(1.1); }

/* DROP AREA */
#drop-area { height:130px; margin:0 40px 30px 40px; border:2px dashed #1F6F54; border-radius:20px; display:flex; align-items:center; justify-content:center; background:white; cursor:pointer; color:#1F6F54; font-weight:500; transition:0.3s ease; }
#drop-area.dragover { background:#f3faf6; transform:scale(1.01); box-shadow:0 0 15px rgba(31,111,84,0.3); }
#fileInput { display:none; }

/* CHAT ITEM */

.chat-item{position:relative;}

.chat-delete{
position:absolute;
right:8px;
top:50%;
transform:translateY(-50%);
width:18px;
height:18px;
cursor:pointer;
opacity:0;
transition:0.2s;
}

.chat-item:hover .chat-delete{
opacity:1;
}

.chat-item button{
width:100%;
text-align:left;
padding-right:30px;
}

.chat-item.active button{
background:#E6F5EE;
border:2px solid #1F6F54;
}

.chat-item.active button:hover{
transform:none;
box-shadow:none;
}
</style>
</head>
<body>

<div class="header">
    <img src="images/logo2.png" class="header-img left" alt="Left">
    <img src="images/name.png" class="header-img center" alt="Center">
    <img src="images/user.png" class="header-img right" id="profileBtn" alt="Right">
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-top">
            <button id="newChat">Новый чат</button>
        </div>
        <img src="images/divider.png" class="sidebar-divider">
        <div class="sidebar-middle"></div>
        <img src="images/divider.png" class="sidebar-divider">
        <div class="sidebar-bottom">
            <div id="username" style="margin-bottom:12px;">...</div>
            <button id="subscribe" style="background:#C8F2D9;">Оформить подписку</button>
            <button id="logout" style="background:#C8F2D9;">Выйти</button>
        </div>
    </div>

    <div class="content">
        <div class="chat-container" id="chat"></div>
        <div id="drop-area">
            Перетащите изображение сюда или нажмите для выбора
            <input type="file" id="fileInput" multiple>
        </div>
    </div>
</div>

<script>
const API_URL = "/analyze";

const chat = document.getElementById("chat");
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const newChatBtn = document.getElementById("newChat");

let chats = JSON.parse(localStorage.getItem("chats")) || [];
let currentChatId = null;

// -------- AUTH & USERNAME --------
function checkAuth(){
    const token = localStorage.getItem("token");
    const username = localStorage.getItem("username");

    if(!token){
        window.location.href = "/login";
        return;
    }

    document.getElementById("username").innerText = username;
}

document.getElementById("logout")?.addEventListener("click", ()=>{
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    window.location.href = "/login";
});

// -------- CHAT MANAGEMENT --------
function createNewChat(){
    const chatId = "chat_" + Date.now();
    const chatObj = { id: chatId, messages: [] };
    chats.push(chatObj);
    localStorage.setItem("chats", JSON.stringify(chats));
    currentChatId = chatId;
    renderChatList();
    renderChat();
}

function getCurrentChat(){
    return chats.find(c => c.id === currentChatId);
}

function renderChatList(){
const container = document.querySelector(".sidebar-middle")
container.innerHTML=""
chats.forEach((chatItem,index)=>{
const wrapper=document.createElement("div")
wrapper.className="chat-item"
if(chatItem.id===currentChatId){
wrapper.classList.add("active")
}
const btn=document.createElement("button")
btn.innerText="Чат "+(index+1)

btn.onclick=()=>{
currentChatId=chatItem.id
renderChatList()
renderChat()
}

const deleteIcon=document.createElement("img")
deleteIcon.src="images/close.png"
deleteIcon.className="chat-delete"

deleteIcon.onclick=(e)=>{

e.stopPropagation()

chats = chats.filter(c=>c.id!==chatItem.id)

localStorage.setItem("chats",JSON.stringify(chats))

if(chats.length===0){
createNewChat()
}else{
currentChatId = chats[0].id
}
renderChatList()
renderChat()
}
wrapper.appendChild(btn)
wrapper.appendChild(deleteIcon)
container.appendChild(wrapper)
})
}

function renderChat(){
    chat.innerHTML = "";
    const current = getCurrentChat();
    if(!current) return;

    current.messages.forEach(msg=>{
        const div = document.createElement("div");
        div.className = "message "+msg.type;

        if(msg.type==="user"){
            const img = document.createElement("img");
            img.className="preview";
            img.src = msg.imgData;
            div.appendChild(img);
        }

        if(msg.type==="bot"){
            if(msg.imgUrl){
                const img = document.createElement("img");
                img.className="result";
                img.src = msg.imgUrl;
                div.appendChild(img);
                div.appendChild(createDownloadIcon(msg.imgUrl));
            }
            if(msg.metricsText){
                const p = document.createElement("p");
                p.innerText = msg.metricsText;
                div.appendChild(p);
            }
        }

        chat.appendChild(div);
    });

    scrollToBottom();
}

// -------- MESSAGES --------
function scrollToBottom(){
    chat.scrollTo({ top: chat.scrollHeight, behavior:"smooth" });
}

function createDownloadIcon(url){
    const icon = document.createElement("img");
    icon.src = "images/download-icon.png";
    icon.className = "download-icon";

    icon.onclick = ()=>{
        const a = document.createElement("a");
        a.href = url;
        a.download = "result.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
    };

    return icon;
}

function addUserMessage(file){
    const img = document.createElement("img");
    img.className = "preview";
    img.src = URL.createObjectURL(file);

    const div = document.createElement("div");
    div.className = "message user";
    div.appendChild(img);

    chat.appendChild(div);
    scrollToBottom();

    const reader = new FileReader();
    reader.onload = e=>{
        getCurrentChat().messages.push({
            type:"user",
            imgData:e.target.result
        });
        localStorage.setItem("chats", JSON.stringify(chats));
    };
    reader.readAsDataURL(file);
}

function addBotMessage(imageUrl, metricsText){
    const div = document.createElement("div");
    div.className = "message bot";

    if(imageUrl){
        const img = document.createElement("img");
        img.className = "result";
        img.src = imageUrl;
        div.appendChild(img);
        div.appendChild(createDownloadIcon(imageUrl));
    }

    if(metricsText){
        const p = document.createElement("p");
        p.innerText = metricsText;
        div.appendChild(p);
    }

    chat.appendChild(div);

    getCurrentChat().messages.push({
        type:"bot",
        imgUrl: imageUrl,
        metricsText: metricsText
    });
    localStorage.setItem("chats", JSON.stringify(chats));

    scrollToBottom();
}

function showProcessing(){
    addBotMessage("", "Фото получены, анализируем...");
}

// -------- FILE HANDLING --------
async function handleFiles(files){
    if(!files || files.length === 0) return;

    const formData = new FormData();
    for(const file of files){
        addUserMessage(file);
        formData.append("images", file);
    }

    showProcessing();

    try{
        const response = await fetch(API_URL, {
            method:"POST",
            body: formData,
            headers: { "ngrok-skip-browser-warning":"true" }
        });

        if(!response.ok){
            addBotMessage("", "Ошибка сервера");
            return;
        }

        const data = await response.json();
        if(!data.results){
            addBotMessage("", "Ошибка анализа изображения");
            return;
        }

        for(const result of data.results){
            const m = result.metrics;
            const metricsText = `Результаты анализа:

Корень:
Длина: ${m.root_length_cm} см
Площадь: ${m.root_area_cm2} см²

Стебель:
Длина: ${m.stem_length_cm} см
Площадь: ${m.stem_area_cm2} см²

Листья:
Площадь: ${m.leaf_area_cm2} см²`;

            addBotMessage(result.image_url, metricsText);
        }

    }catch(err){
        console.error(err);
        addBotMessage("", "Ошибка анализа изображения");
    }
}

// -------- DROP AREA --------
fileInput.onchange = ()=> handleFiles(fileInput.files);

dropArea.addEventListener("click", ()=> fileInput.click());
dropArea.addEventListener("dragover", e=>{
    e.preventDefault();
    dropArea.classList.add("dragover");
});
dropArea.addEventListener("dragleave", ()=> dropArea.classList.remove("dragover"));
dropArea.addEventListener("drop", e=>{
    e.preventDefault();
    dropArea.classList.remove("dragover");
    if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

// -------- INITIAL LOAD --------
window.addEventListener("load", ()=>{
    checkAuth();
    if(chats.length===0) createNewChat();
    else currentChatId = chats[0].id;
    renderChatList();
    renderChat();
});

newChatBtn.addEventListener("click", createNewChat);
document.getElementById("subscribe").onclick=()=>{window.location.href="/pricing"}
document.getElementById("profileBtn").onclick=()=>{window.location.href="/profile"}
</script>

</body>
</html>
