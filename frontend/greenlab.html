<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ФотоСинтез</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#F5F7F6;
}
.header {
    height:70px;
    background:white;
    border-bottom:1px solid #E0E0E0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:600;
    color:#2E7D32;
}
.chat-container {
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:20px;
}
.message {
    max-width:60%;
    padding:12px;
    margin:10px;
    border-radius:16px;
}
.user {
    background:#E8F5E9;
    margin-left:auto;
}
.bot {
    background:white;
    border:1px solid #E0E0E0;
}
.input-container {
    height:70px;
    background:white;
    border-top:1px solid #E0E0E0;
    display:flex;
    align-items:center;
    padding:10px;
}
input[type="text"] {
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}
button {
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#2E7D32;
    color:white;
    cursor:pointer;
}
img.preview, img.result {
    max-width:200px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="header">
🌿 ФотоСинтез
</div>

<div class="chat-container" id="chat"></div>

<div class="input-container">
<input type="file" id="fileInput">
<input type="text" id="textInput" placeholder="Введите сообщение...">
<button onclick="sendMessage()">Отправить</button>
</div>

<script>
const chat = document.getElementById("chat");

// функция добавления сообщений в чат
function addMessage(content, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    if (content instanceof HTMLImageElement)
        div.appendChild(content);
    else
        div.innerText = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// отправка текстового сообщения
function sendMessage() {
    const text = document.getElementById("textInput").value;
    if(text) addMessage(text, "user");
    document.getElementById("textInput").value = "";
    addMessage("Пожалуйста, отправьте изображение растения.", "bot");
}

// отправка изображения на сервер
document.getElementById("fileInput").onchange = async function() {
    const file = this.files[0];
    if(!file) return;

    // показываем превью пользователю
    const imgUser = document.createElement("img");
    imgUser.className = "preview";
    imgUser.src = URL.createObjectURL(file);
    addMessage(imgUser, "user");

    // добавляем сообщение "анализируем"
    addMessage("Анализируем изображение...", "bot");

    const formData = new FormData();
    formData.append("image", file);

    try {
        const response = await fetch("http://127.0.0.1:5000/analyze", {
            method: "POST",
            body: formData
        });
        const data = await response.json();

        // показываем результат от сервера
        const imgBot = document.createElement("img");
        imgBot.className = "result";
        // путь через endpoint /results
        imgBot.src = "http://127.0.0.1:5000/results/" + file.name + "?t=" + new Date().getTime();
        addMessage(imgBot, "bot");

        // показываем метрики
        const metricsText = 
`Результаты анализа:

Корень:
Длина: ${data.metrics.root_length} см

Стебель:
Длина: ${data.metrics.stem_length} см

Листья:
Площадь: ${data.metrics.leaf_area} см²`;

        addMessage(metricsText, "bot");

    } catch (err) {
        addMessage("Ошибка при анализе изображения.", "bot");
        console.error(err);
    }
};
</script>

</body>
</html>
