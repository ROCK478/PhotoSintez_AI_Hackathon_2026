<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ФотоСинтез</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#F5F7F6;
}

.header {
    height: 100px;
    background:#1B5E20;
    border-bottom:1px solid #E0E0E0;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    position:relative;
}

.header-img.left {
    height:80px;
    object-fit:contain;
}

.header-img.right {
    height: 50px;
    object-fit:contain;
}

.header-img.center {
    height:80px;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.chat-container {
    height:calc(100vh - 260px); /* уменьшили высоту на счет увеличения шапки и нижней зоны */
    overflow-y:auto;
    padding:20px;
}
.message {
    max-width:60%;
    padding:12px;
    margin:10px;
    border-radius:16px;
}
.user {
    background:#E8F5E9;
    margin-left:auto;
}
.bot {
    background:white;
    border:1px solid #E0E0E0;
}

#drop-area {
    height:100px; /* чуть выше */
    background:white;
    border-top:1px solid #E0E0E0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
    border: 2px dashed #2E7D32;
    border-radius: 10px;
    cursor: pointer;
    color: #2E7D32;
    font-weight:600;
    transition: all 0.3s ease; /* плавный переход для анимации */
}
#drop-area.dragover {
    background: #E8F5E9;
    transform: scale(1.02); /* слегка увеличиваем при наведении */
    box-shadow: 0 0 10px rgba(46,125,50,0.4);
}

#fileInput {
    display:none;
}

/* Изображения в чате */
img.preview, img.result {
    max-width:200px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="header">
    <img src="images/logo2.png" class="header-img left" alt="Left">

    <img src="images/name.png" class="header-img center" alt="Center">

    <img src="images/user.png" class="header-img right" alt="Right">
</div>

<div class="chat-container" id="chat"></div>

<div id="drop-area">
    Перетащите изображение сюда или нажмите для выбора
    <input type="file" id="fileInput">
</div>

<script>
const chat = document.getElementById("chat");
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");

// функция добавления сообщений
function addMessage(content, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    if (content instanceof HTMLImageElement)
        div.appendChild(content);
    else
        div.innerText = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// обработка выбранного файла
async function handleFile(file) {
    if(!file) return;

    const imgUser = document.createElement("img");
    imgUser.className = "preview";
    imgUser.src = URL.createObjectURL(file);
    addMessage(imgUser, "user");

    addMessage("Анализируем изображение...", "bot");

    const formData = new FormData();
    formData.append("image", file);

    try {
        const response = await fetch("http://127.0.0.1:5000/analyze", {
            method: "POST",
            body: formData
        });
        const data = await response.json();

        const imgBot = document.createElement("img");
        imgBot.className = "result";
        imgBot.src = data.image_url + "?t=" + new Date().getTime();
        addMessage(imgBot, "bot");

        const metricsText = 
`Результаты анализа:

Корень:
Длина: ${data.metrics.root_length} см

Стебель:
Длина: ${data.metrics.stem_length} см

Листья:
Площадь: ${data.metrics.leaf_area} см²`;

        addMessage(metricsText, "bot");

    } catch (err) {
        addMessage("Ошибка при анализе изображения.", "bot");
        console.error(err);
    }
}

// обработка стандартного input
fileInput.onchange = () => handleFile(fileInput.files[0]);

// drag & drop
dropArea.addEventListener("click", () => fileInput.click());

dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("dragover");
    if(e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
    }
});
</script>

</body>
</html>
