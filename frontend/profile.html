<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Профиль — ФотоСинтез</title>

<link rel="icon" href="images/favicon-32x32.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef5f1,#f8fbf9);
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
height:80px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
position:relative;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header-img.left{height:50px;}
.header-img.center{
height:50px;
position:absolute;
left:50%;
transform:translateX(-50%);
}
.header-img.right{height:45px;cursor:pointer;}

/* LAYOUT */

.main{
flex:1;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,#1F6F54,#15523F);
display:flex;
flex-direction:column;
padding:25px;
color:white;
}

.sidebar button{
background:white;
color:#1F6F54;
border:none;
padding:12px;
border-radius:12px;
font-weight:600;
cursor:pointer;
margin-bottom:12px;
}

/* CONTENT */

.content{
flex:1;
padding:60px;
}

/* PROFILE CARD */

.profile-card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:500px;
}

.profile-card h2{
margin-top:0;
color:#1F6F54;
}

.info{
margin:15px 0;
font-size:16px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#E6F5EE;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-bottom:20px;
color:#1F6F54;
font-weight:700;
}

</style>
</head>

<body>

<div class="header">
<img src="images/logo2.png" class="header-img left">
<img src="images/name.png" class="header-img center">
<img src="images/user.png" class="header-img right">
</div>

<div class="main">

<div class="sidebar">

<button onclick="location.href='/main'">Чат</button>
<button onclick="location.href='/pricing'">Тарифы</button>

<div style="flex:1"></div>

<div id="username"></div>

<button onclick="logout()">Выйти</button>

</div>

<div class="content">

<div class="profile-card">

<div class="avatar" id="avatar"></div>

<h2>Профиль пользователя</h2>

<div class="info" id="userInfo"></div>

<div class="info">
Тариф: Free
</div>

<div class="info">
Использовано анализов: 3 / 10
</div>

</div>

</div>
</div>

<script>

const username = localStorage.getItem("username")

document.getElementById("username").innerText =
"Пользователь: " + username

document.getElementById("userInfo").innerText =
"Имя пользователя: " + username

document.getElementById("avatar").innerText =
username ? username[0].toUpperCase() : "U"

function logout(){
localStorage.removeItem("token")
localStorage.removeItem("username")
location.href="/login"
}

</script>

</body>
</html>
